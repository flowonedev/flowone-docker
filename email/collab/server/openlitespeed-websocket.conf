# OpenLiteSpeed WebSocket Proxy Configuration
# =============================================================================
#
# Add this to your vhost configuration for email.devcon1.hu
#
# Location: Usually in /usr/local/lsws/conf/vhosts/email.devcon1.hu/vhconf.conf
#
# =============================================================================

# Context for WebSocket collaboration endpoint
context /collab_ws {
  type                    proxy
  handler                 localhost:1234
  addDefaultCharset       off
}

# Alternative: If using rewrite rules
# rewriteRule ^/collab_ws(.*)$ ws://127.0.0.1:1234$1 [P]

# =============================================================================
# Manual Setup Steps:
# =============================================================================
#
# 1. Open OpenLiteSpeed Admin Panel (typically https://your-server:7080)
# 2. Go to Virtual Hosts > email.devcon1.hu > Context
# 3. Add a new "Proxy" context:
#    - URI: /collab_ws
#    - Web Server: [Add new] localhost:1234
#    - Enable WebSocket: Yes
#
# 4. Or edit vhconf.conf directly and add the context above
#
# 5. Restart OpenLiteSpeed:
#    /usr/local/lsws/bin/lswsctrl restart
#
# =============================================================================

