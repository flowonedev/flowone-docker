; Local-dev opcache tuning. The backend + vendor tree has well over the default
; 10k cacheable files; without this opcache thrashes and recompiles every
; request (made far worse by the slow Windows bind-mount filesystem).
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=30000
; Keep live-edit reload (bind mount), but only re-stat files every 5s instead of
; every request, which avoids the per-request stat storm over the host mount.
opcache.validate_timestamps=1
opcache.revalidate_freq=5
opcache.fast_shutdown=1
