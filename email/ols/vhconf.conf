# FlowOne local OpenLiteSpeed vhost (DEV / HTTP only).
#
# Mirrors production fleet/templates/openlitespeed/vhost-email.conf.template,
# but: HTTP only (no vhssl), and the SPA is served by the Vite dev container
# (HMR) instead of OLS serving /var/www/vps-email/dist. OLS here runs the PHP
# backend via lsphp83/LSAPI — the production-parity bit that gives the app a
# real fastcgi_finish_request() for its post-response deferred work.

docRoot                   /var/www/html/backend/public
enableGzip                1

errorlog /usr/local/lsws/logs/flowone.error_log {
  useServer               0
  logLevel                INFO
  rollingSize             10M
}

accesslog /usr/local/lsws/logs/flowone.access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  rollingSize             10M
}

index  {
  useServer               0
  indexFiles              index.php
}

# LSAPI handler -> lsphp83 (same binary path as production).
scripthandler  {
  add                     lsapi:lsphp83 php
}

extprocessor lsphp83 {
  type                    lsapi
  address                 uds://tmp/lshttpd/lsphp83.sock
  maxConns                10
  env                     PHP_LSAPI_CHILDREN=10
  #ENV_INJECT
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
  autoStart               1
  path                    /usr/local/lsws/lsphp83/bin/lsphp
  backlog                 100
  instances               1
  runOnStartUp            1
  extMaxIdleTime          -1
  priority                0
  memSoftLimit            2047M
  memHardLimit            2047M
  procSoftLimit           1400
  procHardLimit           1500
}

# Front controller: everything that is not a real file/dir -> index.php.
# (LiteSpeed forwards the Authorization header to LSAPI by default, so unlike
# Apache mod_php no special HTTP_AUTHORIZATION rewrite is needed.)
context / {
  location                /var/www/html/backend/public/
  allowBrowse             1
  rewrite  {
    enable                1
    rules                 <<<END_rules
RewriteEngine On
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ index.php [L,QSA]
END_rules
  }
}
