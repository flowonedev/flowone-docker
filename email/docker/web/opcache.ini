; Production opcache. Source is BAKED into the image and never changes at
; runtime, so timestamp validation is disabled for maximum throughput (a new
; image/deploy replaces the container, which resets the cache).
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=30000
opcache.validate_timestamps=0
opcache.fast_shutdown=1
opcache.revalidate_freq=0
