# FlowOne PRODUCTION OpenLiteSpeed vhost (containerized web tier).
#
# Mirrors fleet/templates/openlitespeed/vhost-email.conf.template but is
# single-tenant and self-contained for the per-server docker stack:
#   - docRoot is the BAKED frontend build (/var/www/vps-email/dist)
#   - /api/ runs the PHP backend under lsphp83/LSAPI
#   - /collab-ws and /mailsync_ws proxy to the collab/mailsync containers
#
# Runtime substitutions performed by entrypoint.sh (sentinels are wrapped in @@
# so they never collide with prose in this header):
#   ENV INJECT sentinel   -> `env KEY=VALUE` lines (LSAPI does not inherit the
#                            container env; only extprocessor env reaches lsphp)
#   COLLAB / MAILSYNC addr -> the collab/mailsync container addresses
#   VHSSL sentinel        -> a full vhssl{} block when ENABLE_SSL=1

docRoot                   /var/www/vps-email/dist
enableGzip                1

index  {
  useServer               0
  indexFiles              index.php, index.html
}

errorlog /usr/local/lsws/logs/flowone.error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
  keepDays                30
}

accesslog /usr/local/lsws/logs/flowone.access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  rollingSize             10M
  keepDays                30
}

# PHP backend under real LSAPI (gives the app fastcgi_finish_request()).
scripthandler  {
  add                     lsapi:flowone php
}

extprocessor flowone {
  type                    lsapi
  address                 uds://tmp/lshttpd/flowone.sock
  maxConns                35
  env                     PHP_LSAPI_CHILDREN=35
  env                     LSAPI_AVOID_FORK=200M
  @@ENV_INJECT@@
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
  autoStart               2
  path                    /usr/local/lsws/lsphp83/bin/lsphp
  backlog                 100
  instances               1
  runOnStartUp            3
  extMaxIdleTime          -1
  priority                0
  memSoftLimit            2047M
  memHardLimit            2047M
  procSoftLimit           1400
  procHardLimit           1500
}

extprocessor collab_ws {
  type                    proxy
  address                 __COLLAB_ADDR__
  maxConns                100
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

extprocessor mailsync_ws {
  type                    proxy
  address                 __MAILSYNC_ADDR__
  maxConns                100
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

# Mail-client auto-configuration (PUBLIC XML endpoints served by the backend).
rewrite  {
  enable                  1
  autoLoadHtaccess        1
  rules                   <<<END_rules
RewriteEngine On
RewriteRule ^/?autodiscover/autodiscover\.xml$ /api/autodiscover/autodiscover.xml [NC,L]
RewriteRule ^/?mail/config-v1\.1\.xml$ /api/mail/config-v1.1.xml [L]
RewriteRule ^/?autoconfig/mail/config-v1\.1\.xml$ /api/autoconfig/mail/config-v1.1.xml [L]
RewriteRule ^/?\.well-known/autoconfig/mail/config-v1\.1\.xml$ /api/.well-known/autoconfig/mail/config-v1.1.xml [L]
END_rules
}

# API -> PHP front controller.
context /api/ {
  type                    NULL
  location                /var/www/vps-email/backend/public/
  allowBrowse             1
  indexFiles              index.php
  rewrite  {
    enable                1
    inherit               0
    rules                 <<<END_rules
RewriteEngine On
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ index.php [L,QSA]
END_rules
  }
}

# SPA -> dist with history fallback to index.html.
context / {
  location                /var/www/vps-email/dist/
  allowBrowse             1
  rewrite  {
    enable                1
    inherit               1
    rules                 <<<END_rules
RewriteEngine On
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ /index.html [L]
END_rules
  }
}

websocket /collab-ws {
  address                 __COLLAB_ADDR__
}

websocket /mailsync_ws {
  address                 __MAILSYNC_ADDR__
}

context /collab-ws {
  type                    proxy
  handler                 collab_ws
  addDefaultCharset       off
  extraHeaders            <<<END_extraHeaders
set Upgrade "websocket"
set Connection "Upgrade"
END_extraHeaders
}

context /mailsync_ws {
  type                    proxy
  handler                 mailsync_ws
  addDefaultCharset       off
  extraHeaders            <<<END_extraHeaders
set Upgrade "websocket"
set Connection "Upgrade"
END_extraHeaders
}

@@VHSSL_INJECT@@
