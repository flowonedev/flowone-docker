
# --- FlowOne production: vhost definition (appended to httpd_config.conf) ---
# NOTE: we do NOT add a new :80/:443 listener here — the stock image already
# ships listeners on those ports. The Dockerfile instead removes the demo
# "vhTemplate docker" vhost and maps `flowone` onto the existing HTTP listener
# (and entrypoint.sh maps it onto HTTPS when ENABLE_SSL=1). Adding a second
# listener on the same port collides with the stock one, whose demo vhost
# force-redirects to HTTPS.
virtualhost flowone {
  vhRoot                  /var/www/vps-email
  configFile              $SERVER_ROOT/conf/vhosts/flowone/vhconf.conf
  allowSymbolLink         1
  enableScript            1
  restrained              0
}
