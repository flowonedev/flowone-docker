# FlowOne PRODUCTION per-server stack (Phase B).
#
# One compose stack per server. Build once + push to a registry; servers pull
# (REGISTRY/TAG) — the `build:` sections let you build locally as a fallback.
# All config comes from .env (copy .env.example -> .env, fill per host).
#
#   docker compose build           # build the three app images locally
#   ./gen-jwt-keys.sh              # LOCAL ONLY: seed the jwt_keys volume (prod
#                                  # is seeded by Fleet / the migration snapshot)
#   docker compose up -d           # bring the stack up
#
# Bridge-network app tier (web, mariadb, redis, meilisearch, collab, mailsync)
# PLUS the host-networked `mail` pod (Postfix/Dovecot/OpenDKIM/OpenDMARC/Rspamd/
# ClamAV/SpamAssassin/Unbound). The remaining host-net pods (powerdns, coturn/
# livekit) and onlyoffice are still authored separately. NOTE: the `mail` service
# uses network_mode: host, so the FULL stack only runs on Linux — Docker Desktop
# on Windows can't run host networking faithfully (bring up the bridge tier there
# with `--scale mail=0` or omit it).
name: flowone

services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      # Create the app user on a fresh volume (granted on MARIADB_DATABASE).
      # On a migrated/restored box the dump already carries users + grants.
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      # Consumed by mariadb-init/10-mailserver.sh (fresh volume only) to create
      # the mailserver DB + least-privilege mailuser for the host-net mail pod.
      MAIL_DB_NAME: ${MAIL_DB_NAME:-mailserver}
      MAIL_DB_USER: ${MAIL_DB_USER:-mailuser}
      MAIL_DB_PASS: ${MAIL_DB_PASS:-}
    # Expose ONLY on the host loopback so the host-networked mail pod can reach
    # the DB at 127.0.0.1:3306 (matches the native postfix/dovecot `hosts` maps).
    # Never published to the public interface.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # --su-mysql connects via the local socket as the mysql OS user, so it
      # needs no provisioned `healthcheck` DB user (the stock --connect does).
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      # First-time datadir init can be slow; don't fail depends_on early.
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly for durability; require a password only when one is set. The
    # conditional is evaluated by the CONTAINER shell at runtime ($$ escapes the
    # var from compose interpolation), so an empty REDIS_PASSWORD = no auth.
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      # The meilisearch image ships curl; /health returns {"status":"available"}.
      # Without this, compose reports no health and the Fleet health-wait would
      # pass meilisearch on "running" alone.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7700/health | grep -q available"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ${REGISTRY:-flowone}/flowone-web:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    # Compose-fixed values (service names / container bindings) override .env.
    environment:
      COLLAB_ADDR: collab:1234
      MAILSYNC_ADDR: mailsync:1235
    # Native OpenLiteSpeed on the HOST owns public :80/:443 and terminates TLS,
    # then reverse-proxies email.<domain> to this container. So in production the
    # container publishes ONLY on the host loopback (native OLS proxies to
    # 127.0.0.1:8080 -> container :80) and never serves TLS itself (ENABLE_SSL=0).
    # Local dev has no native OLS, so docker-compose.override.yml re-adds a public
    # :80 mapping (compose concatenates `ports`, so both bindings coexist there).
    ports:
      - "127.0.0.1:8080:80"
    # The mail pod runs on the HOST network (network_mode: host), so the bridge
    # service name "mail" won't resolve from here. IMAP_HOST/SMTP_HOST/SIEVE_HOST
    # in .env point at host.docker.internal, which this maps to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The image ships a HEALTHCHECK, but the app's cold-start (a fresh lsphp
    # worker must autoload the framework + open DB/Redis connections) can spike a
    # first request to ~8s. A tight 5s check false-flags the whole box "unhealthy"
    # (Degraded) even though warm requests answer in ~0.4s. Override here (compose
    # takes precedence over the image's HEALTHCHECK, so it applies WITHOUT an image
    # rebuild) with a tolerant window and 127.0.0.1 to skip the IPv6-localhost
    # fallback. 401 = app booted + router ran + DB/Redis answered (healthy liveness).
    healthcheck:
      test: ["CMD-SHELL", "c=$$(curl -s -o /dev/null -w '%{http_code}' --max-time 18 http://127.0.0.1/api/auth/me); [ \"$$c\" = 200 ] || [ \"$$c\" = 401 ]"]
      interval: 30s
      timeout: 20s
      start_period: 90s
      retries: 5
    volumes:
      - vps_email_storage:/var/www/vps-email/backend/storage
      - vps_email_data:/var/www/vps-email/data
      # User files: drive, mood-board uploads, portal docs (config.php storage_path
      # + drive.storage_path default here). MUST be persistent or uploads are lost
      # on container recreate. Distinct tree from backend/storage (logs/temp).
      - vps_email_files:/var/www/vps-email/storage
      - jwt_keys:/etc/flowone/jwt:ro
      # Only consulted when ENABLE_SSL=1; harmless to mount otherwise.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      collab:
        condition: service_started
      mailsync:
        condition: service_started

  collab:
    image: ${REGISTRY:-flowone}/flowone-collab:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/collab/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      COLLAB_WS_HOST: 0.0.0.0
      COLLAB_WS_PORT: "1234"
      # collab validates collaborators against the backend over the bridge net.
      PHP_BACKEND_URL: http://web:80/api
    # Publish on the host loopback so the native OpenLiteSpeed front tier can
    # reverse-proxy the /collab-ws WebSocket straight to it (127.0.0.1:1234),
    # exactly as the native email vhost does. Never exposed on the public iface.
    ports:
      - "127.0.0.1:1234:1234"
    volumes:
      - jwt_keys:/etc/flowone/jwt:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mailsync:
    image: ${REGISTRY:-flowone}/flowone-mailsync:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/mailsync/Dockerfile
    restart: unless-stopped
    # Single replica only: holds in-memory IMAP IDLE + call/huddle state.
    env_file: [.env]
    environment:
      MAILSYNC_WS_HOST: 0.0.0.0
      MAILSYNC_WS_PORT: "1235"
      # mailsync reads DB_PASSWORD; the rest of the stack uses DB_PASS.
      DB_PASSWORD: ${DB_PASS}
    # Publish on the host loopback so the native OpenLiteSpeed front tier can
    # reverse-proxy the /mailsync_ws WebSocket straight to it (127.0.0.1:1235).
    ports:
      - "127.0.0.1:1235:1235"
    volumes:
      - jwt_keys:/etc/flowone/jwt:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Full mail server (Postfix + Dovecot + OpenDKIM + OpenDMARC + Rspamd + ClamAV
  # + SpamAssassin + Unbound) in one supervised pod. HOST networking so port-25
  # inbound preserves real sender IPs (RBLs/SPF/fail2ban) and to bind the mail
  # ports directly. Reaches the DB via 127.0.0.1:3306 (mariadb's loopback
  # publish). LINUX ONLY — Docker Desktop can't run network_mode: host faithfully.
  mail:
    image: ${REGISTRY:-flowone}/flowone-mail:${TAG:-latest}
    build:
      context: ./mail
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      SERVER_FQDN: ${SERVER_FQDN:-${MAIL_DOMAIN}}
      SERVER_IP: ${SERVER_IP:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-postmaster@${MAIL_DOMAIN}}
      MAIL_DB_HOST: 127.0.0.1
      MAIL_DB_PORT: "3306"
      MAIL_DB_NAME: ${MAIL_DB_NAME:-mailserver}
      MAIL_DB_USER: ${MAIL_DB_USER:-mailuser}
      MAIL_DB_PASS: ${MAIL_DB_PASS}
      # Heavy security services — default ON for parity. Set to 0 in .env on
      # small boxes (ClamAV needs ~1.2GB RAM). Postfix stays milter_default_
      # action=accept, and DKIM/DMARC/Rspamd remain on, so mail + signing work.
      MAIL_ENABLE_CLAMAV: ${MAIL_ENABLE_CLAMAV:-1}
      MAIL_ENABLE_SPAMASSASSIN: ${MAIL_ENABLE_SPAMASSASSIN:-1}
      MAIL_ENABLE_RSPAMD: ${MAIL_ENABLE_RSPAMD:-1}
    volumes:
      - mail_vmail:/home/vmail                 # user mail (CRITICAL)
      - mail_dkim:/etc/opendkim/keys           # DKIM key (must stay stable)
      - mail_certs:/etc/letsencrypt            # pod's own cert dir (self-signed fallback + copied real cert)
      # Host certbot tree (read-only). entrypoint copies the real cert for
      # TLS_CERT_NAME from here into the writable volume above; absent on boxes
      # without certs (self-signed fallback then). Renewal: restart the mail pod.
      - /etc/letsencrypt:/etc/letsencrypt-host:ro
      - mail_clamav:/var/lib/clamav            # AV signatures (avoid re-download)
      - mail_rspamd_redis:/var/lib/redis-rspamd # Bayes training
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
  redis_data:
  meili_data:
  vps_email_storage:
  vps_email_data:
  vps_email_files:
  jwt_keys:
  mail_vmail:
  mail_dkim:
  mail_certs:
  mail_clamav:
  mail_rspamd_redis:
