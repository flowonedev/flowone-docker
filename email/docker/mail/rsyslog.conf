# Minimal rsyslog for the mail pod: capture the /dev/log socket (opendkim,
# opendmarc, spamass-milter, policyd-spf) and forward everything to stdout so
# `docker logs` shows it. No kernel log (imklog) — it can't read /proc/kmsg in a
# container. Postfix logs directly to /dev/stdout (maillog_file), bypassing this.
module(load="imuxsock")

template(name="plain" type="string" string="%syslogtag%%msg%\n")
*.*  action(type="omfile" file="/dev/stdout" template="plain")
