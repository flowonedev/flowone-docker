# Unbound resolver — FlowOne Docker mail pod.
# Recursive resolver bound to 127.0.0.1:5335 (PowerDNS owns :53 on the native
# box; keep the same port so Rspamd/options.inc points here). Loopback only.
server:
    port: 5335
    interface: 127.0.0.1
    access-control: 127.0.0.0/8 allow
    do-ip6: no
    hide-identity: yes
    hide-version: yes
    prefetch: yes
    cache-min-ttl: 60
    num-threads: 2
    # Container: unbound-anchor/root.key may be absent; don't hard-fail on DNSSEC.
    val-permissive-mode: yes
