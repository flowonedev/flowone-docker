# Rspamd antivirus (ClamAV) — FlowOne Docker mail pod.
# Talks to the pod-local clamd over its unix socket.
clamav {
    type = "clamav";
    servers = "/var/run/clamav/clamd.ctl";
    # Don't fail the whole scan if clamd is still warming up (freshclam DB load).
    action = "reject";
    scan_mime_parts = true;
    symbol = "CLAM_VIRUS";
    patterns {
        JUST_EICAR = '^Eicar-Test-Signature$';
    }
}
