# Pod-local Redis for Rspamd (Bayes + ratelimit) — FlowOne Docker mail pod.
# Loopback-only, no auth. Separate from the app's redis container (which lives on
# the compose bridge). AOF off; Bayes is cheap to relearn, RDB snapshot is enough.
bind 127.0.0.1
port 6379
daemonize no
save 900 1
save 300 10
dir /var/lib/redis-rspamd
appendonly no
maxmemory 256mb
maxmemory-policy allkeys-lru
