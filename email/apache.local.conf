<VirtualHost *:80>
    DocumentRoot /var/www/html/backend/public

    <Directory /var/www/html/backend/public>
        AllowOverride All
        Require all granted
        Options -Indexes

        RewriteEngine On

        # Forward the Authorization header to PHP. Apache + mod_php strips it by
        # default, which causes $_SERVER['HTTP_AUTHORIZATION'] to be empty and
        # all Bearer-token auth to fail with 401.
        RewriteCond %{HTTP:Authorization} .
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
