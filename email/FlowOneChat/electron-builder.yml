appId: com.flowone.chat
productName: FlowOne Chat
copyright: Copyright (c) 2024 FlowOne

protocols:
  - name: FlowOne
    schemes:
      - flowone

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*

asar: true
compression: normal

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}
  publisherName: FlowOne

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

portable:
  artifactName: ${productName}-${version}-Portable.${ext}

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: assets/icon.icns
  category: public.app-category.social-networking
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icons
  category: Network
  maintainer: support@flowone.app

appImage:
  artifactName: ${productName}-${version}.${ext}

deb:
  artifactName: ${productName}-${version}-${arch}.${ext}
  depends:
    - libnotify4
    - libxtst6
    - libnss3

publish:
  provider: generic
  url: https://updates.flowone.app/chat

electronUpdaterCompatibility: ">= 2.16"
