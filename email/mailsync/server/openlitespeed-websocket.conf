# OpenLiteSpeed WebSocket Proxy Configuration for Mail Sync
# Add this context to your virtual host configuration
#
# Location: /usr/local/lsws/conf/vhosts/email.devcon1.hu/vhconf.conf
# Or add via WebAdmin Console

context /mailsync_ws {
  type                    proxy
  handler                 localhost:1235
  addDefaultCharset       off
}

# Note: Ensure WebSocket upgrade headers are passed through
# This is typically handled automatically by OpenLiteSpeed's proxy

